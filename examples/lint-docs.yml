# ============================================================
# Sample CI for Docs Linter
# ------------------------------------------------------------
# このワークフローは、docs-linter を submodule または npm パッケージとして
# 利用するリポジトリで、Markdown ドキュメントの自動 lint を実行するサンプルです。
#
# npm のみで使う場合 (推奨):
#  - package.json に devDependencies で @s2j/docs-linter を登録
#  - npm install --save-dev @s2j/docs-linter
#  - lint ステップ: npx s2j-docs-linter ...
#  package.json の lint:docs 移行: docs/cli/npm_usage.md (#packagejson-統合)
#  詳細: docs/cli/npm_usage.md
#
# 利用方法:
#  1. このファイルをコピーして、利用側リポジトリの
#     `.github/workflows/lint-docs.yml` に配置します。
#  2. 対象パスなどを各プロジェクトに合わせて調整します。
#  3. プロジェクトに応じた .textlintrc 設定ファイルを配置します。
#
# 必須要件:
#  - Node.js v20+
#  - Submodule 利用時: textlint と docs-linter が package.json に登録済みであること
#  - npm 利用時: @s2j/docs-linter が devDependencies に登録済みであること
#  - プロジェクトに応じた .textlintrc 設定ファイル
# ============================================================

name: Lint Docs

on:
  push:
    paths:
      - "docs/**/*.md"
      - "**/*.md"
      - ".textlintrc*"
      - "package.json"
  pull_request:
    paths:
      - "docs/**/*.md"
      - "**/*.md"
      - ".textlintrc*"
      - "package.json"

jobs:
  lint-docs:
    name: Run Docs Linter
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------------
      # 1. チェックアウト
      # submodules: true により docs-linter を取得
      # --------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      # --------------------------------------------------------
      # 2. Node.js セットアップ
      # --------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --------------------------------------------------------
      # 2.5. npm キャッシュの最適化
      # 実行速度が約3倍になる、CI失敗時のパッケージ破損防止にも効果的
      # --------------------------------------------------------
      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # --------------------------------------------------------
      # 3. 依存関係のインストール
      # docs-linter が submodule の場合は個別に npm ci を実行
      # --------------------------------------------------------
      - name: Install dependencies
        run: |
          if [ -d "./docs-linter" ]; then
            echo "Installing docs-linter dependencies..."
            cd docs-linter
            npm ci
            cd ..
            npm install --no-save ./docs-linter
          else
            echo "docs-linter not found as submodule. Installing via npm..."
            npm install --save-dev @s2j/docs-linter
          fi

      # --------------------------------------------------------
      # 3.5. textlint バージョンを固定（破壊的アップデートの予防）
      # --------------------------------------------------------
      - name: Install textlint (version pinned)
        run: npm install textlint@15.4.0

      # --------------------------------------------------------
      # 4. 設定ファイルの確認
      # --------------------------------------------------------
      - name: Check textlint configuration
        run: |
          if [ -f ".textlintrc.jsonc" ]; then
            echo "Using .textlintrc.jsonc"
          elif [ -f ".textlintrc" ]; then
            echo "Using .textlintrc"
          else
            echo "::warning::No textlint configuration found. Using default settings."
          fi

      # --------------------------------------------------------
      # 5. Lint 実行
      # 推奨: npx s2j-docs-linter（プロジェクトの .textlintrc* を自動解決）
      # Submodule / 旧手順: npx textlint --config <file> ...
      # CI では docs のみを対象（README.md と docs/**/*.md、自動 fix は off）
      # --------------------------------------------------------
      - name: Run Docs Linter
        if: "!contains(github.event.head_commit.message, '[skip-lint]')"
        run: |
          TARGETS=()
          [ -f "README.md" ] && TARGETS+=("README.md")
          [ -d "docs" ] && TARGETS+=("docs/**/*.md")

          if [ "${#TARGETS[@]}" -eq 0 ]; then
            echo "::warning::No README.md or docs/ directory to lint."
            exit 0
          fi

          npx s2j-docs-linter "${TARGETS[@]}" || {
            echo "::error::Docs Linter found issues."
            exit 1
          }

      # --------------------------------------------------------
      # 6. レポート出力（失敗時）
      # --------------------------------------------------------
      - name: Save lint report
        if: failure()
        run: |
          mkdir -p reports
          npx textlint "docs/**/*.md" "README.md" -f json > reports/textlint-report.json 2>/dev/null || true
        continue-on-error: true

      # --------------------------------------------------------
      # 7. アーティファクトとしてアップロード
      # --------------------------------------------------------
      - name: Upload lint report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: textlint-report-${{ github.run_number }}
          path: reports/textlint-report.json
          if-no-files-found: ignore

      # --------------------------------------------------------
      # 8. コメント投稿（PR の場合）
      # --------------------------------------------------------
      - name: Comment PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '';
            try {
              report = fs.readFileSync('reports/textlint-report.json', 'utf8');
            } catch (e) {
              report = 'Lint report not available.';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📝 Documentation Lint Results

              Textlint found issues in the documentation. Please review and fix the following:

              \`\`\`json
              ${report}
              \`\`\`

              For more information, see the [Actions tab](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).
              `
            });
