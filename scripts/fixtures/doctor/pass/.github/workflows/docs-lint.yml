name: Docs Lint

on:
  push:
    paths:
      - "**/*.md"
      - ".textlintrc.json"

  pull_request:
    paths:
      - "**/*.md"
      - ".textlintrc.json"

jobs:
  docs-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run lint:docs
