# Node.js compatibility CI — matrix lint / pack verification
# 仕様: docs/archive/mod-npm/status.md フェーズ4 必須 #4

name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify publish tarball
        run: npm run pack:check

      - name: Verify tarball contents
        run: npm run verify:tarball

      - name: Test init command
        run: bash scripts/test-init.sh

      - name: Test doctor command
        run: bash scripts/test-doctor.sh
